<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welkom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222d;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e8eaed;
      --muted: #9aa3ad;
      --accent: #3d8bfd;
      --accent-hover: #5a9dff;
      --accent-soft: rgba(61, 139, 253, 0.12);
      --radius: 14px;
      --shadow: 0 24px 48px -12px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
    }

    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(61, 139, 253, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(100, 120, 200, 0.08), transparent);
    }

    main {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 4vw, 3rem);
    }

    .panel {
      width: min(100%, 440px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(2rem, 5vw, 2.75rem);
      animation: enter 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .panel.swap-out {
      animation: swapOut 0.28s ease-in forwards;
    }

    .panel.swap-in {
      animation: swapIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes swapOut {
      to {
        opacity: 0;
        transform: scale(0.96);
      }
    }

    @keyframes swapIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.65rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .lead {
      color: var(--muted);
      font-size: 1.05rem;
      margin-bottom: 2rem;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .choice-btn {
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      text-align: left;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .choice-btn:hover {
      background: var(--accent-soft);
      border-color: rgba(61, 139, 253, 0.35);
    }

    .choice-btn:active {
      transform: scale(0.99);
    }

    .choice-btn span.chevron {
      color: var(--accent);
      opacity: 0.85;
      font-size: 1.1rem;
    }

    .result-wrap {
      text-align: center;
      padding: clamp(1rem, 3vw, 2rem) 0;
    }

    .result-word {
      font-family: "Fraunces", Georgia, serif;
      font-weight: 700;
      font-size: clamp(3.5rem, 14vw, 6.5rem);
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #e8eaed 0%, #a8b4c4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      user-select: none;
    }

    .back-btn {
      margin-top: 2rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 4px;
      transition: color 0.2s;
    }

    .back-btn:hover {
      color: var(--accent-hover);
    }

    [hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="bg-pattern" aria-hidden="true"></div>
  <main>
    <div id="panel" class="panel" role="region" aria-live="polite">
      <section id="view-welcome">
        <h1>Welkom</h1>
        <p class="lead">
          Kies hieronder wat je wilt zien. Je keuze bepaalt wat er op het scherm verschijnt.
        </p>
        <div class="choices">
          <button type="button" class="choice-btn" data-coding="1">
            Ik wil meer
            <span class="chevron" aria-hidden="true">→</span>
            
            <button type="button" class="choice-btn" data-coding="2">
            Ik wil minder
            <span class="chevron" aria-hidden="true">→</span>
          </button>
        </div>
      </section>

      <section id="view-result" hidden>
        <div class="result-wrap">
          <p id="result-word" class="result-word" aria-label="resultaat"></p>
        </div>
        <button type="button" class="back-btn" id="btn-back">← Terug naar start</button>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const panel = document.getElementById("panel");
      const viewWelcome = document.getElementById("view-welcome");
      const viewResult = document.getElementById("view-result");
      const resultWord = document.getElementById("result-word");
      const btnBack = document.getElementById("btn-back");

      function showResult(coding) {
        panel.classList.remove("swap-in");
        panel.classList.add("swap-out");
        window.setTimeout(function () {
          if (coding === 1) {
            resultWord.textContent = "LEEUW";     
          } else if (coding === 2) {
            resultWord.textContent = "MUIS";
          }
          viewWelcome.hidden = true;
          viewResult.hidden = false;
          panel.classList.remove("swap-out");
          void panel.offsetWidth;
          panel.classList.add("swap-in");
        }, 260);
      }

      document.querySelectorAll(".choice-btn").forEach(function (btn) {
        btn.addEventListener("click", function () {
          const coding = parseInt(btn.getAttribute("data-coding"), 10);
          showResult(coding);
        });
      });

      btnBack.addEventListener("click", function () {
        panel.classList.remove("swap-in");
        panel.classList.add("swap-out");
        window.setTimeout(function () {
          viewResult.hidden = true;
          viewWelcome.hidden = false;
          panel.classList.remove("swap-out");
          void panel.offsetWidth;
          panel.classList.add("swap-in");
        }, 260);
      });
    })();
  </script>
</body>
</html>
